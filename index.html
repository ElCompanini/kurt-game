<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Kurt — El Clicker que ama a los niños</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👀</text></svg>" />
  </head>
  <body>
    <div id="app"></div>

    <!-- HUD -->
    <header id="topbar">
      <div class="brand">
        <span class="brand-eyes">👀</span>
        <div class="brand-text">
          <h1>KURT</h1>
          <p>el que ama a los niños</p>
        </div>
      </div>
      <div id="stats">
        <div class="stat">
          <span id="candy" class="stat-value">0</span>
          <span class="stat-label">🍬 Caramelos</span>
        </div>
        <div class="stat">
          <span id="cps" class="stat-value">0</span>
          <span class="stat-label">por segundo</span>
        </div>
        <div class="stat">
          <span id="kids" class="stat-value">0</span>
          <span class="stat-label">👦 niños cerca</span>
        </div>
      </div>
    </header>

    <div id="hint">Hacé click en Kurt para darle caramelos 🍬</div>

    <!-- Tienda de mejoras -->
    <aside id="shop">
      <h2>Mejoras</h2>
      <div id="shop-list"></div>
    </aside>

    <button id="shop-toggle" aria-label="Abrir tienda">🛒</button>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
